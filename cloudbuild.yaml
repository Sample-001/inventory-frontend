# ==============================================================================
# Cloud Build 自動化の手順書 (cloudbuild.yaml)
#
# 【一連の流れ】
#  1. ソースコードから「コンテナ（箱）」を作る (Build)
#  2. 作った箱を「倉庫」に預ける (Push)
#  3. 倉庫の箱を使って「本番環境」を更新する (Deploy)
# ==============================================================================

steps:
  # ----------------------------------------------------------------------------
  # Step 1: コンテナイメージのビルド（アプリケーションを箱に詰める）
  # ----------------------------------------------------------------------------
  # 'docker build' コマンドを実行して、Dockerfileをもとにイメージを作成します。
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      # '-t' は作成する箱に「名札（タグ）」を付けるオプションです。
      - '-t'
      # 名札のルール： 倉庫の場所 / プロジェクトID / リポジトリ名 / イメージ名 : バージョン
      # $COMMIT_SHA は、GitHubの更新ごとの「固有のID（コミットハッシュ）」に自動で置き換わります。
      # これにより「いつの時点のコードで作られた箱か」が確実に管理できます。
      - 'asia-northeast1-docker.pkg.dev/cycom-gcp-dev/inventory-repo/inventory-api:$COMMIT_SHA'
      # '.' は「現在のフォルダにあるファイル（Dockerfileなど）を全部使ってね」という意味です。
      - '.'

  # ----------------------------------------------------------------------------
  # Step 2: Artifact Registry へプッシュ（作った箱をGoogleの倉庫に保存する）
  # ----------------------------------------------------------------------------
  # 【重要】デプロイ（Step 3）をする前に、必ずこの手順で倉庫に箱を預ける必要があります。
  # 預けていないと、Step 3で「そんな箱は見つからない！」とエラーになってしまいます。
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      # Step 1で名札を付けた箱を、指定した倉庫へアップロードします。
      - 'asia-northeast1-docker.pkg.dev/cycom-gcp-dev/inventory-repo/inventory-api:$COMMIT_SHA'

  # ----------------------------------------------------------------------------
  # Step 3: Cloud Run へのデプロイ（倉庫の箱を使って、実際のWebサービスを更新する）
  # ----------------------------------------------------------------------------
  # 'gcloud run deploy' コマンドを実行して、Cloud Runの設定を更新します。
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      # 更新するCloud Runのサービス名です。
      - 'inventory-api'
      
      # '--image' で、先ほど倉庫（Artifact Registry）に預けた箱を指定して取り出します。
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/cycom-gcp-dev/inventory-repo/inventory-api:$COMMIT_SHA'
      
      # '--region' で、サービスを動かす地域（東京）を指定します。
      - '--region'
      - 'asia-northeast1'
      
      # '--ingress' で、アクセスできる経路を制限します。
      # 「直接URLを叩くのは禁止して、ロードバランサー（アクセス整理役）経由だけ許可する」というセキュリティ設定です。
      - '--ingress'
      - 'internal-and-cloud-load-balancing'
      
      # '--service-account' で、このCloud Runが動くときの「身分証」を指定します。
      # 権限を必要最小限に絞った、安全な専用アカウントを使います。
      - '--service-account'
      - 'inventory-run-sa@cycom-gcp-dev.iam.gserviceaccount.com'

# ----------------------------------------------------------------------------
# options: Cloud Build 全体の設定
# ----------------------------------------------------------------------------
options:
  # ビルドの作業履歴（ログ）を「Cloud Logging」という専用の場所にだけ保存します。
  # 余計な場所に保存して容量を使わないようにするための設定です。
  logging: CLOUD_LOGGING_ONLY