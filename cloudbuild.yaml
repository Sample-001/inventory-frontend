# ==============================================================================
# Cloud Build 自動化の手順書 (cloudbuild.yaml)
#
# 【一連の流れ】
#  1. ソースコードから「コンテナ（箱）」を作る (Build)
#  2. 作った箱を「倉庫」に預ける (Push)
#  3. 倉庫の箱を使って「本番環境」を更新する (Deploy)
# ==============================================================================

steps:
  # ----------------------------------------------------------------------------
  # Step 1: コンテナイメージのビルド（アプリケーションを箱に詰める）
  # ----------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      # 名札のルール： 倉庫の場所 / プロジェクトID / リポジトリ名 / イメージ名 : バージョン
      # $COMMIT_SHA は、GitHubが発行する「更新ごとの固有ID」に自動で置き換わります。
      # これにより「いつの時点のコードか」が確実に管理できます。
      - 'asia-northeast1-docker.pkg.dev/cycom-gcp-dev/inventory-repo/inventory-api:$COMMIT_SHA'
      # '.' は「現在のフォルダにあるファイル（Dockerfileなど）を全部使ってね」という意味です。
      - '.'

  # ----------------------------------------------------------------------------
  # Step 2: Artifact Registry へプッシュ（作った箱をGoogleの倉庫に保存する）
  # ----------------------------------------------------------------------------
  # デプロイ（Step 3）をする前に、必ずこの手順で倉庫に箱を預ける必要があります。
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/cycom-gcp-dev/inventory-repo/inventory-api:$COMMIT_SHA'

  # ----------------------------------------------------------------------------
  # Step 3: Cloud Run へのデプロイ（倉庫の箱を使って、実際のWebサービスを更新する）
  # ----------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'inventory-api' # 更新するCloud Runのサービス名
      
      # 倉庫に預けた箱を取り出して使います
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/cycom-gcp-dev/inventory-repo/inventory-api:$COMMIT_SHA'
      
      # サービスを動かす地域（東京）
      - '--region'
      - 'asia-northeast1'
      
      # 【セキュリティ設定】
      # 直接URLを叩くのを禁止し、ロードバランサー（アクセス整理役）経由だけ許可します。
      - '--ingress'
      - 'internal-and-cloud-load-balancing'
      
      # 【権限設定】
      # 権限を必要最小限に絞った、安全な専用アカウントを使います。
      - '--service-account'
      - 'inventory-run-sa@cycom-gcp-dev.iam.gserviceaccount.com'

      # ========================================================
      # 【コスト最適化・サーバースペック設定】
      # 過去の手動デプロイ時の設定を上書きし、検証用途に最適化します。
      # ========================================================
      - '--min-instances'
      - '0'       # 【重要】アクセスがない時はサーバーを0台にして課金をストップします！
      - '--max-instances'
      - '2'       # アクセス急増時でも最大2台までに制限し、想定外の出費を防ぎます。
      - '--cpu'
      - '1'       # 割り当てるCPUの数（今回は最小限の1で十分です）
      - '--memory'
      - '512Mi'   # 割り当てるメモリの量（Nginxなら512MBで余裕です）

# ----------------------------------------------------------------------------
# options: Cloud Build 全体の設定
# ----------------------------------------------------------------------------
options:
  # ビルドの作業履歴（ログ）を「Cloud Logging」という専用の場所にだけ保存します。
  logging: CLOUD_LOGGING_ONLY