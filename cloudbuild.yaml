steps:
  # 1. コンテナイメージのビルド
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-northeast1-docker.pkg.dev/cycom-gcp-dev/inventory-repo/inventory-api:$COMMIT_SHA', '.']

  # 2. Cloud Run へのデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'inventory-api'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/cycom-gcp-dev/inventory-repo/inventory-api:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast1'
      - '--ingress'
      - 'internal-and-cloud-load-balancing'
      - '--service-account'
      - 'inventory-run-sa@cycom-gcp-dev.iam.gserviceaccount.com'

# docker push コマンドの代わりに、images 指定を使うのがベストプラクティスです
images:
  - 'asia-northeast1-docker.pkg.dev/cycom-gcp-dev/inventory-repo/inventory-api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY