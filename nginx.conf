server {
    # Cloud Run はポート 8080 でリッスンする必要があります
    listen 8080;
    server_name localhost;
    
    # 文字コードを指定
    charset utf-8;

    # ドキュメントルートの設定
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # 監視用エンドポイント (Google Cloud Monitoring / Load Balancer用)
    # WAFの影響を受けずに稼働確認を行うため、ログ出力をオフにして軽量化します
    # -------------------------------------------------------------------------
    location /healthz {
        access_log off;
        add_header 'Content-Type' 'text/plain';
        return 200 "OK";
    }

    # -------------------------------------------------------------------------
    # メインアプリケーションの配信設定
    # React Routerなどのクライアントサイド・ルーティングに対応するため、
    # 実在しないパスへのアクセスはすべて index.html に転送します (SPA対応)
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # エラーページの設定（500系エラー発生時）
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
